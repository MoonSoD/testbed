# Root compose - defines shared external networks
# Each zone connects to these networks via their own compose files

networks:
  public_net:
    name: ${PUBLIC_NET_NAME}
    driver: bridge
    ipam:
      config:
        - subnet: ${PUBLIC_SUBNET}

  service_net:
    name: ${SERVICE_NET_NAME}
    driver: bridge
    ipam:
      config:
        - subnet: ${SERVICE_SUBNET}

  protected_net:
    name: ${PROTECTED_NET_NAME}
    driver: bridge
    ipam:
      config:
        - subnet: ${PROTECTED_SUBNET}
