services:
  service-protected-fw:
    build: ../router
    container_name: service-protected-fw
    hostname: service-protected-fw
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      net.ipv4.ip_forward: "1"
    networks:
      service_net:
        ipv4_address: ${SERVICE_PROTECTED_FW_SERVICE_IP}
      protected_net:
        ipv4_address: ${SERVICE_PROTECTED_FW_PROTECTED_IP}
    restart: unless-stopped

networks:
  service_net:
    external: true
    name: ${SERVICE_NET_NAME}
  protected_net:
    external: true
    name: ${PROTECTED_NET_NAME}
