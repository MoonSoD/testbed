services:
  redis:
    build: ./redis
    container_name: protected-redis
    hostname: protected-redis
    networks:
      protected_net:
        ipv4_address: ${PROTECTED_REDIS_IP}
    cap_add:
      - NET_ADMIN
    environment:
      - SERVICE_SUBNET=${SERVICE_SUBNET}
      - SERVICE_PROTECTED_FW_PROTECTED_IP=${SERVICE_PROTECTED_FW_PROTECTED_IP}
    volumes:
      - redis_data:/data

  probe:
    build: ./probe
    container_name: protected-probe
    hostname: protected-probe
    networks:
      protected_net:
        ipv4_address: ${PROTECTED_PROBE_IP}
    cap_add:
      - NET_ADMIN
    command: >
      sh -c "ip route replace ${SERVICE_SUBNET} via ${SERVICE_PROTECTED_FW_PROTECTED_IP} && npm start"
    environment:
      - ZONE_NAME=protected
      - PORT=3000

volumes:
  redis_data:

networks:
  protected_net:
    external: true
    name: ${PROTECTED_NET_NAME}
