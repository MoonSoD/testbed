events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        location /api/probe/ {
            proxy_pass http://public-probe:3000/;
        }

        location /api/ {
            proxy_pass http://service-api:5001/;
        }
    }
}
